<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭用在庫管理</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f7;color:#222}
.app{max-width:480px;margin:0 auto;padding:12px}
h1{font-size:17px;font-weight:700;padding:12px 0 10px;text-align:center;color:#2d2d2d}
.tabs{display:flex;border:1px solid #ddd;border-radius:12px;overflow:hidden;margin-bottom:14px;background:#fff}
.tab{flex:1;padding:9px 2px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;background:#fff;color:#888;border:none}
.tab.active{background:#fff8f0;color:#d4600a}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:12px}
.section-label{font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
.scan-area{display:flex;gap:8px;margin-bottom:10px}
.scan-area input{flex:1;font-size:15px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;outline:none}
.scan-btn{padding:9px 12px;font-size:13px;white-space:nowrap;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-weight:500}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qty-row label{font-size:13px;color:#888;min-width:52px}
.qty-row input{width:90px;font-size:16px;font-weight:600;text-align:center;padding:8px;border:1px solid #ddd;border-radius:8px;outline:none}
.action-row{display:flex;gap:10px}
.btn-in{flex:1;padding:13px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#E8752A;color:#fff}
.btn-out{flex:1;padding:13px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#5B8FD4;color:#fff}
.btn-in:active{opacity:.85}.btn-out:active{opacity:.85}
.btn-in:disabled,.btn-out:disabled{opacity:.4;cursor:not-allowed}
.preview{padding:10px 12px;background:#fff8f0;border:1px solid #fddcb8;border-radius:8px;margin-bottom:10px;display:none}
.pname{font-weight:600;font-size:15px;color:#2d2d2d}
.pinfo{color:#888;font-size:12px;margin-top:2px}
.pstock{font-size:13px;margin-top:6px}
.pstock .num{font-weight:700;color:#E8752A}
.alert-low{color:#e24b4a;font-size:12px;margin-top:4px;font-weight:500}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;color:#fff;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.in{background:#E8752A}.toast.out{background:#5B8FD4}.toast.err{background:#e24b4a}.toast.show{opacity:1}
/* 在庫一覧 */
.category-section{margin-bottom:16px}
.category-title{font-size:13px;font-weight:700;color:#888;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:6px}
.category-icon{font-size:16px}
.item-group{background:#fff;border:1px solid #eee;border-radius:10px;margin-bottom:8px;overflow:hidden}
.item-header{display:flex;align-items:center;padding:10px 12px;cursor:pointer;gap:8px}
.item-name{flex:1;font-weight:600;font-size:14px}
.item-total{font-size:13px;font-weight:600;color:#E8752A}
.item-total.low{color:#e24b4a}
.item-detail{display:none;border-top:1px solid #f5f5f5}
.product-row{display:flex;align-items:center;padding:8px 12px;gap:8px;border-bottom:1px solid #f9f9f9;font-size:13px}
.product-row:last-child{border-bottom:none}
.product-name{flex:1;color:#555}
.product-stock{font-weight:500;color:#333}
.product-stock.low{color:#e24b4a}
/* 履歴 */
.log-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.log-item:last-child{border-bottom:none}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.in{background:#fdebd8;color:#c25a0a}.badge.out{background:#dce9f8;color:#2c5fa1}
.log-info{flex:1}.log-name{font-weight:500}.log-meta{color:#888;font-size:12px;margin-top:1px}
.log-qty{font-weight:600;font-size:14px}.log-qty.in{color:#E8752A}.log-qty.out{color:#5B8FD4}
/* 商品登録 */
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.reg-grid>div,.reg-full{display:flex;flex-direction:column;gap:4px;margin-bottom:0}
.reg-full{margin-bottom:8px}
.reg-grid label,.reg-full label{font-size:12px;color:#888}
.reg-grid input,.reg-grid select,.reg-full input,.reg-full select{padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;background:#fff}
.reg-grid input:focus,.reg-full input:focus{border-color:#E8752A}
.reg-btn{width:100%;padding:12px;font-size:14px;font-weight:600;border-radius:10px;border:none;cursor:pointer;background:#E8752A;color:#fff;margin-top:6px}
.reg-btn.sub{background:#f5f5f5;color:#333;border:1px solid #ddd;margin-top:4px}
.unit-toggle{display:flex;gap:8px;margin-bottom:8px}
.unit-btn{flex:1;padding:8px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;color:#888;cursor:pointer;font-weight:500}
.unit-btn.active{background:#fff8f0;border-color:#E8752A;color:#E8752A}
.loading{text-align:center;padding:20px;color:#aaa;font-size:13px}
.empty{text-align:center;padding:28px;color:#aaa;font-size:13px}
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:12px;font-size:12px;color:#666}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:#1D9E75}
.dot.spin{background:#EF9F27;animation:pulse 1s infinite}
.dot.err{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#reader{width:100%;margin-bottom:8px;border-radius:10px;overflow:hidden;display:none}
#reader__dashboard{display:none !important}
.stop-btn{width:100%;padding:10px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #fcc;background:#fff0f0;color:#e24b4a;cursor:pointer;margin-bottom:10px;display:none}
.chevron{transition:transform .2s;font-size:12px;color:#aaa}
.chevron.open{transform:rotate(180deg)}
.alert-badge{background:#ffe0e0;color:#e24b4a;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;margin-left:4px}
/* 品目マスタ */
.group-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.group-item:last-child{border-bottom:none}
.group-cat{color:#888;min-width:60px}
.group-name{flex:1;font-weight:500}
</style>
</head>
<body>
<div class="app">
  <h1>🏠 家庭用在庫管理</h1>

  <div class="sync-bar">
    <span><span class="dot" id="dot"></span><span id="sync-msg">接続中...</span></span>
    <button onclick="refreshAll()" style="font-size:12px;padding:3px 10px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer">更新</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('scan')">スキャン</button>
    <button class="tab" onclick="showTab('stock')">在庫一覧</button>
    <button class="tab" onclick="showTab('log')">履歴</button>
    <button class="tab" onclick="showTab('reg')">商品登録</button>
    <button class="tab" onclick="showTab('master')">品目設定</button>
  </div>

  <!-- スキャンタブ -->
  <div id="tab-scan">
    <div class="card">
      <div class="section-label">JANコード</div>
      <div id="reader"></div>
      <button class="stop-btn" id="stop-btn" onclick="stopCam()">■ カメラを停止</button>
      <div class="scan-area">
        <input type="text" id="jan-input" placeholder="4901234567890" inputmode="numeric"
          oninput="onJanInput(this.value)" onkeydown="if(event.key==='Enter')lookupJan()"/>
        <button class="scan-btn" id="cam-btn" onclick="startCam()">📷 カメラ</button>
      </div>
      <div class="preview" id="preview">
        <div class="pname" id="prev-name"></div>
        <div class="pinfo" id="prev-info"></div>
        <div class="pstock" id="prev-stock"></div>
        <div class="alert-low" id="prev-alert" style="display:none">⚠️ 発注ラインを下回っています！</div>
      </div>
      <div class="qty-row">
        <label>数量</label>
        <input type="number" id="qty-input" value="1" min="1" max="9999"/>
      </div>
      <div class="action-row">
        <button class="btn-in" id="btn-in" onclick="doRecord('in')">入庫</button>
        <button class="btn-out" id="btn-out" onclick="doRecord('out')">開封・出庫</button>
      </div>
    </div>
  </div>

  <!-- 在庫一覧タブ -->
  <div id="tab-stock" style="display:none">
    <div id="stock-list"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- 履歴タブ -->
  <div id="tab-log" style="display:none">
    <div class="card"><div id="log-list"><div class="loading">読み込み中...</div></div></div>
  </div>

  <!-- 商品登録タブ -->
  <div id="tab-reg" style="display:none">
    <div class="card">
      <div class="section-label">新規商品登録</div>
      <div class="reg-full">
        <label>JANコード ＊</label>
        <input type="text" id="reg-jan" placeholder="4901234567890" inputmode="numeric"/>
      </div>
      <div class="reg-grid">
        <div>
          <label>種類 ＊</label>
          <select id="reg-category" onchange="filterItems()">
            <option value="">選択してください</option>
            <option>風呂</option><option>洗濯</option><option>衛生</option>
            <option>掃除</option><option>ペット</option><option>食品</option>
            <option>家電</option><option>他</option>
          </select>
        </div>
        <div>
          <label>品目 ＊</label>
          <select id="reg-item">
            <option value="">種類を選択後</option>
          </select>
        </div>
      </div>
      <div class="reg-full">
        <label>商品名 ＊</label>
        <input type="text" id="reg-name" placeholder="例：ハミング 1000ml"/>
      </div>
      <div class="section-label" style="margin-top:4px">管理単位</div>
      <div class="unit-toggle">
        <button class="unit-btn active" id="unit-count" onclick="setUnit('個数')">📦 個数</button>
        <button class="unit-btn" id="unit-vol" onclick="setUnit('容量')">🧴 容量(ml/g)</button>
      </div>
      <div class="reg-grid">
        <div id="volume-field" style="display:none">
          <label>1個あたりの容量</label>
          <input type="number" id="reg-volume" placeholder="例：1000" min="0"/>
        </div>
        <div>
          <label>初期在庫数</label>
          <input type="number" id="reg-stock" value="0" min="0"/>
        </div>
        <div>
          <label>発注ライン（個数）</label>
          <input type="number" id="reg-orderline" value="1" min="0"/>
        </div>
      </div>
      <button class="reg-btn" onclick="registerProduct()">登録する</button>
    </div>
    <div class="card">
      <div class="section-label">登録済み商品</div>
      <div id="reg-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 品目設定タブ -->
  <div id="tab-master" style="display:none">
    <div class="card">
      <div class="section-label">品目を追加</div>
      <div class="reg-grid">
        <div>
          <label>種類</label>
          <select id="master-category">
            <option>風呂</option><option>洗濯</option><option>衛生</option>
            <option>掃除</option><option>ペット</option><option>食品</option>
            <option>家電</option><option>他</option>
          </select>
        </div>
        <div>
          <label>品目名</label>
          <input type="text" id="master-item" placeholder="例：シャンプー"/>
        </div>
      </div>
      <button class="reg-btn" onclick="addGroup()">追加する</button>
    </div>
    <div class="card">
      <div class="section-label">登録済み品目</div>
      <div id="group-list"><div class="loading">読み込み中...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbw72eySIRa71eyz29H08On4MT5CvYmStFOW258Kt1F7WDhEzgRRG-wrf1QawAFscYSbxA/exec';
const CATEGORY_ICONS={'風呂':'🛁','洗濯':'👕','衛生':'🪥','掃除':'🧹','ペット':'🐾','食品':'🍱','家電':'💡','他':'📦'};
let products=[];
let groups=[];
let selectedUnit='個数';
let html5QrCode=null;

async function api(params){
  const url=GAS_URL+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url);
  return res.json();
}

function setSync(state,msg){
  const d=document.getElementById('dot');
  d.className='dot'+(state==='loading'?' spin':state==='err'?' err':'');
  document.getElementById('sync-msg').textContent=msg;
}

async function loadAll(){
  setSync('loading','読み込み中...');
  try{
    const [pd,gd]=await Promise.all([api({action:'getProducts'}),api({action:'getGroups'})]);
    products=pd.products||[];
    groups=gd.groups||[];
    setSync('ok','スプレッドシート連携中');
    return true;
  }catch(e){
    setSync('err','接続エラー');
    return false;
  }
}

async function refreshAll(){
  await loadAll();
  const idx=Array.from(document.querySelectorAll('.tab')).findIndex(e=>e.classList.contains('active'));
  if(idx===1)renderStock();
  if(idx===2)await loadAndRenderLog();
  if(idx===3)renderRegList();
  if(idx===4)renderGroupList();
}

function showTab(t){
  ['scan','stock','log','reg','master'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['scan','stock','log','reg','master'][i]===t);
  });
  if(t==='stock'){loadAll().then(renderStock);}
  if(t==='log')loadAndRenderLog();
  if(t==='reg'){loadAll().then(()=>{renderRegList();filterItems();});}
  if(t==='master'){loadAll().then(renderGroupList);}
  if(t!=='scan')stopCam();
}

function toast(msg,type='in'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}

function setUnit(u){
  selectedUnit=u;
  document.getElementById('unit-count').classList.toggle('active',u==='個数');
  document.getElementById('unit-vol').classList.toggle('active',u==='容量');
  document.getElementById('volume-field').style.display=u==='容量'?'flex':'none';
}

function filterItems(){
  const cat=document.getElementById('reg-category').value;
  const sel=document.getElementById('reg-item');
  sel.innerHTML='<option value="">選択してください</option>';
  groups.filter(g=>g.category===cat).forEach(g=>{
    const o=document.createElement('option');
    o.value=g.item;o.textContent=g.item;
    sel.appendChild(o);
  });
}

function onJanInput(v){
  if(v.length>=8)lookupJan();
  else document.getElementById('preview').style.display='none';
}

function lookupJan(){
  const jan=document.getElementById('jan-input').value.trim();
  const p=products.find(p=>p.jan===jan);
  const pr=document.getElementById('preview');
  if(p){
    document.getElementById('prev-name').textContent=p.name;
    document.getElementById('prev-info').textContent=
      [p.category,p.item].filter(Boolean).join(' › ')+
      (p.unit==='容量'?' ／ 1個'+p.volume+'ml/g':'');
    const stockTxt=p.unit==='容量'
      ? `在庫: <span class="num">${p.stock}個</span>（合計 ${calcTotalVol(p.item)} ml/g）`
      : `在庫: <span class="num">${p.stock}個</span>`;
    document.getElementById('prev-stock').innerHTML=stockTxt;
    const alertEl=document.getElementById('prev-alert');
    alertEl.style.display=p.stock<=p.orderLine?'':'none';
    pr.style.display='';
  }else{
    pr.style.display='none';
  }
}

function calcTotalVol(item){
  return products
    .filter(p=>p.item===item&&p.unit==='容量')
    .reduce((s,p)=>(parseFloat(p.volume)||0)*(parseInt(p.stock)||0)+s,0);
}

async function doRecord(type){
  const jan=document.getElementById('jan-input').value.trim();
  const qty=parseInt(document.getElementById('qty-input').value)||1;
  if(!jan){toast('JANコードを入力してください','err');return;}
  const bi=document.getElementById('btn-in');
  const bo=document.getElementById('btn-out');
  bi.disabled=bo.disabled=true;
  setSync('loading','記録中...');
  try{
    const data=await api({action:'record',jan,qty,type});
    if(data.error){toast(data.error,'err');setSync('ok','スプレッドシート連携中');}
    else{
      const label=type==='in'?'入庫':'開封・出庫';
      let msg=data.name+' '+label+' '+qty+'個（在庫: '+data.stock+'）';
      toast(msg,type);
      if(data.stock<=data.orderLine)
        setTimeout(()=>toast('⚠️ '+data.name+' 発注ラインを下回りました！','err'),800);
      document.getElementById('jan-input').value='';
      document.getElementById('qty-input').value='1';
      document.getElementById('preview').style.display='none';
      await loadAll();
    }
  }catch(e){
    toast('通信エラーが発生しました','err');
    setSync('err','接続エラー');
  }
  bi.disabled=bo.disabled=false;
}

function renderStock(){
  const el=document.getElementById('stock-list');
  if(!products.length){el.innerHTML='<div class="card"><div class="empty">商品がまだ登録されていません</div></div>';return;}

  // 種類でグループ化
  const byCategory={};
  const catOrder=['風呂','洗濯','衛生','掃除','ペット','食品','家電','他'];
  products.forEach(p=>{
    const cat=p.category||'他';
    if(!byCategory[cat])byCategory[cat]=[];
    byCategory[cat].push(p);
  });

  let html='';
  catOrder.forEach(cat=>{
    if(!byCategory[cat])return;
    const prods=byCategory[cat];
    // 品目でさらにグループ化
    const byItem={};
    prods.forEach(p=>{
      const item=p.item||'その他';
      if(!byItem[item])byItem[item]=[];
      byItem[item].push(p);
    });

    const icon=CATEGORY_ICONS[cat]||'📦';
    html+=`<div class="card category-section">
      <div class="category-title"><span class="category-icon">${icon}</span>${cat}</div>`;

    Object.entries(byItem).forEach(([item,ps])=>{
      // 品目合計
      const totalCount=ps.reduce((s,p)=>s+(parseInt(p.stock)||0),0);
      const isVolume=ps.some(p=>p.unit==='容量');
      const totalVol=isVolume?ps.filter(p=>p.unit==='容量').reduce((s,p)=>s+(parseFloat(p.volume)||0)*(parseInt(p.stock)||0),0):0;
      const hasLow=ps.some(p=>parseInt(p.stock)<=parseFloat(p.orderLine));
      const totalStr=isVolume?`${totalCount}個（計${totalVol}ml/g）`:`${totalCount}個`;
      const groupId='grp-'+cat+'-'+item;

      html+=`<div class="item-group">
        <div class="item-header" onclick="toggleGroup('${groupId}')">
          <div class="item-name">${item}${hasLow?'<span class="alert-badge">要発注</span>':''}</div>
          <div class="item-total ${hasLow?'low':''}">${totalStr}</div>
          <span class="chevron" id="chev-${groupId}">▼</span>
        </div>
        <div class="item-detail" id="${groupId}">`;

      ps.forEach(p=>{
        const low=parseInt(p.stock)<=parseFloat(p.orderLine);
        const stockStr=p.unit==='容量'
          ?`${p.stock}個（${(parseFloat(p.volume)||0)*(parseInt(p.stock)||0)}ml/g）`
          :`${p.stock}個`;
        html+=`<div class="product-row">
          <div class="product-name">${p.name}<br><span style="font-size:11px;color:#bbb">${p.jan}</span></div>
          <div class="product-stock ${low?'low':''}">${stockStr}${low?' ⚠️':''}</div>
        </div>`;
      });
      html+='</div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function toggleGroup(id){
  const el=document.getElementById(id);
  const chev=document.getElementById('chev-'+id);
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  chev.classList.toggle('open',!open);
}

async function loadAndRenderLog(){
  const el=document.getElementById('log-list');
  el.innerHTML='<div class="loading">読み込み中...</div>';
  try{
    const data=await api({action:'getLogs'});
    const logs=data.logs||[];
    if(!logs.length){el.innerHTML='<div class="empty">履歴がまだありません</div>';return;}
    el.innerHTML=logs.map(l=>`
      <div class="log-item">
        <span class="badge ${l.type}">${l.type==='in'?'入庫':'開封'}</span>
        <div class="log-info">
          <div class="log-name">${l.name}</div>
          <div class="log-meta">${l.category} › ${l.item}　${l.time}　在庫: ${l.stock}</div>
        </div>
        <div class="log-qty ${l.type}">${l.type==='in'?'+':'-'}${l.qty}</div>
      </div>`).join('');
  }catch(e){
    el.innerHTML='<div class="empty">読み込みに失敗しました</div>';
  }
}

function renderRegList(){
  const el=document.getElementById('reg-list');
  if(!products.length){el.innerHTML='<div class="empty">商品がまだ登録されていません</div>';return;}
  el.innerHTML=products.map(p=>`
    <div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5;gap:8px;font-size:13px">
      <div style="flex:1">
        <div style="font-weight:500">${p.name}</div>
        <div style="color:#aaa;font-size:11px">${p.category} › ${p.item} ／ ${p.jan}</div>
      </div>
      <button onclick="deleteProduct('${p.jan}')" style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer">削除</button>
    </div>`).join('');
}

function renderGroupList(){
  const el=document.getElementById('group-list');
  if(!groups.length){el.innerHTML='<div class="empty">品目がまだ登録されていません</div>';return;}
  el.innerHTML=groups.map(g=>`
    <div class="group-item">
      <span class="group-cat">${CATEGORY_ICONS[g.category]||'📦'} ${g.category}</span>
      <span class="group-name">${g.item}</span>
    </div>`).join('');
}

async function addGroup(){
  const category=document.getElementById('master-category').value;
  const item=document.getElementById('master-item').value.trim();
  if(!item){toast('品目名を入力してください','err');return;}
  setSync('loading','登録中...');
  try{
    const data=await api({action:'addGroup',category,item});
    if(data.error){toast(data.error,'err');setSync('ok','スプレッドシート連携中');return;}
    toast(item+'を登録しました','in');
    document.getElementById('master-item').value='';
    await loadAll();
    renderGroupList();
    filterItems();
  }catch(e){
    toast('通信エラーが発生しました','err');
    setSync('err','接続エラー');
  }
}

async function registerProduct(){
  const jan=document.getElementById('reg-jan').value.trim();
  const category=document.getElementById('reg-category').value;
  const item=document.getElementById('reg-item').value;
  const name=document.getElementById('reg-name').value.trim();
  const volume=document.getElementById('reg-volume').value;
  const stock=document.getElementById('reg-stock').value;
  const orderLine=document.getElementById('reg-orderline').value;
  if(!jan||!category||!item||!name){toast('JANコード・種類・品目・商品名は必須です','err');return;}
  setSync('loading','登録中...');
  try{
    const data=await api({action:'addProduct',jan,category,item,name,
      unit:selectedUnit,volume,stock,orderLine});
    if(data.error){toast(data.error,'err');setSync('ok','スプレッドシート連携中');return;}
    toast(name+'を登録しました','in');
    document.getElementById('reg-jan').value='';
    document.getElementById('reg-name').value='';
    document.getElementById('reg-volume').value='';
    document.getElementById('reg-stock').value='0';
    document.getElementById('reg-orderline').value='1';
    await loadAll();
    renderRegList();
  }catch(e){
    toast('通信エラーが発生しました','err');
    setSync('err','接続エラー');
  }
}

async function deleteProduct(jan){
  const p=products.find(p=>p.jan===jan);
  if(!confirm(p?.name+'を削除しますか？'))return;
  try{
    const data=await api({action:'deleteProduct',jan});
    if(data.error){toast(data.error,'err');return;}
    toast('削除しました','err');
    await loadAll();
    renderRegList();
  }catch(e){
    toast('通信エラーが発生しました','err');
  }
}

async function startCam(){
  document.getElementById('reader').style.display='block';
  document.getElementById('stop-btn').style.display='block';
  document.getElementById('cam-btn').style.display='none';
  try{
    html5QrCode=new Html5Qrcode('reader');
    const devices=await Html5Qrcode.getCameras();
    if(!devices||devices.length===0){toast('カメラが見つかりません','err');stopCam();return;}
    const backCam=devices.find(d=>
      d.label.toLowerCase().includes('back')||
      d.label.toLowerCase().includes('rear')||
      d.label.toLowerCase().includes('environment'));
    const camId=backCam?backCam.id:devices[devices.length-1].id;
    await html5QrCode.start(camId,
      {fps:30,qrbox:{width:300,height:150},aspectRatio:1.7,
       experimentalFeatures:{useBarCodeDetectorIfSupported:true},
       formatsToSupport:[
         Html5QrcodeSupportedFormats.EAN_13,
         Html5QrcodeSupportedFormats.EAN_8,
         Html5QrcodeSupportedFormats.UPC_A,
         Html5QrcodeSupportedFormats.UPC_E,
         Html5QrcodeSupportedFormats.CODE_128,
       ]},
      (code)=>{
        document.getElementById('jan-input').value=code;
        stopCam();lookupJan();
        toast('スキャン完了: '+code,'in');
      },()=>{});
  }catch(e){
    toast('カメラを起動できませんでした','err');stopCam();
  }
}

async function stopCam(){
  if(html5QrCode){
    try{if(html5QrCode.getState()===2)await html5QrCode.stop();}catch(e){}
    html5QrCode=null;
  }
  document.getElementById('reader').style.display='none';
  document.getElementById('reader').innerHTML='';
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('cam-btn').style.display='block';
}

loadAll();
</script>
